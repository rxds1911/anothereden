<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>战斗 - 另一个伊甸攻略站</title>
</head>
<body>
  <div id="app">
    <button class="sidebar-toggle" @click="toggleSidebar">☰</button>
    <div class="sidebar-overlay" :class="{ show: sidebarOpen }" @click="toggleSidebar"></div>
    <aside class="sidebar" :class="{ open: sidebarOpen }">
      <app-sidebar current-page="battle"></app-sidebar>
    </aside>
    <main class="main-content">
      <div class="char-page-header">
        <div>
          <h1 class="char-page-title">战斗</h1>
          <p class="char-page-count">共 <strong>{{ filteredData.length }}</strong> 个战斗</p>
        </div>
      </div>
      <search-bar v-model="searchQuery" placeholder="搜索战斗..." :filters="filterOptions" v-model:filter-value="filterValue"></search-bar>
      <data-table :columns="columns" :data="filteredData" ></data-table>
    </main>
  </div>
  <script type="module">
    import { createApp } from "vue"
    import AppSidebar from "../../components/AppSidebar.vue"
    import SearchBar from "../../components/SearchBar.vue"
    import DataTable from "../../components/DataTable.vue"
        import { sampleBattles } from "../../data/samples/battle.js"
    import "../../assets/styles/variables.css"
    import "../../assets/styles/reset.css"
    import "../../assets/styles/layout.css"
    import "../../assets/styles/sidebar.css"
    import "../../assets/styles/table.css"

    const columns = [{ label: '编号', key: 'id', sortable: false }, { label: '名称', key: 'name', sortable: false }, { label: '开始条件', key: 'startCondition', sortable: false }, { label: '出现地域', key: 'location', sortable: false }, { label: '报酬', key: 'reward', sortable: false }]

    const app = createApp({
      data() {
        return { searchQuery: "", filterValue: "",  columns, filterOptions: [], sidebarOpen: false }
      },
      computed: {
        allData() { return sampleBattles },
        filteredData() {
          let list = this.allData
          if (this.filterValue) {
            list = list.filter(r => r.element === this.filterValue || r.type === this.filterValue)
          }
          if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase()
            list = list.filter(r => Object.values(r).some(v => v.toString().toLowerCase().includes(q)))
          }
          return list
        }
      },
      methods: {
        toggleSidebar() { this.sidebarOpen = !this.sidebarOpen }
      }
    })
    app.component("app-sidebar", AppSidebar)
    app.component("search-bar", SearchBar)
    app.component("data-table", DataTable)
app.mount("#app")
  </script>
</body>
</html>
