<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色 - 另一个伊甸攻略站</title>
</head>
<body>
  <div id="app">
    <button class="sidebar-toggle" @click="toggleSidebar">☰</button>
    <div class="sidebar-overlay" :class="{ show: sidebarOpen }" @click="toggleSidebar"></div>
    <aside class="sidebar" :class="{ open: sidebarOpen }">
      <app-sidebar current-page="characters"></app-sidebar>
    </aside>
    <main class="main-content">
      <div class="char-page-header">
        <div>
          <h1 class="char-page-title">角色</h1>
          <p class="char-page-count">共 <strong>{{ filteredData.length }}</strong> 名角色</p>
        </div>
      </div>
      <search-bar v-model="searchQuery" placeholder="搜索角色..."></search-bar>
      <div class="filter-bar">
        <div class="filter-group">
          <span class="filter-label">武器</span>
          <span v-for="f in weaponOptions" :key="f"
            class="filter-chip" :class="{ active: filterWeapon.includes(f) }"
            @click="toggleFilter('filterWeapon', f)">{{ f }}</span>
        </div>
        <div class="filter-group">
          <span class="filter-label">属性</span>
          <span v-for="f in elementOptions" :key="f"
            class="filter-chip" :class="{ active: filterElement.includes(f) }"
            @click="toggleFilter('filterElement', f)">{{ f }}</span>
        </div>
        <div class="filter-group">
          <span class="filter-label">头衔</span>
          <span v-for="f in formOptions" :key="f"
            class="filter-chip" :class="{ active: filterForm.includes(f) }"
            @click="toggleFilter('filterForm', f)">{{ f }}</span>
        </div>
        <div class="filter-group">
          <span class="filter-label">天冥</span>
          <span v-for="f in lightShadowOptions" :key="f"
            class="filter-chip" :class="{ active: filterLightShadow.includes(f) }"
            @click="toggleFilter('filterLightShadow', f)">{{ f }}</span>
        </div>
        <div class="filter-group">
          <span class="filter-label filter-label-clickable" @click="showPersonality = !showPersonality">
            个性筛选（点击展开）
          </span>
        </div>
        <div v-show="showPersonality" class="filter-collapse-content">
          <div class="filter-group">
            <span v-for="f in personalityOptions" :key="f"
              class="filter-chip" :class="{ active: filterPersonality.includes(f) }"
              @click="toggleFilter('filterPersonality', f)">{{ f }}</span>
          </div>
        </div>
      </div>
      <data-table :columns="columns" :data="filteredData" v-model:sort-key="sortKey" v-model:sort-dir="sortDir" :has-active-filters="hasActiveFilters" @row-click="goToDetail" @clear-filters="clearFilters"></data-table>
    </main>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
