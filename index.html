<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>另一个伊甸 - 攻略查询站</title>
  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <div id="app">
    <button class="sidebar-toggle" @click="toggleSidebar">☰</button>
    <div class="sidebar-overlay" :class="{ show: sidebarOpen }" @click="toggleSidebar"></div>
    <aside class="sidebar" :class="{ open: sidebarOpen }">
      <app-sidebar current-page="index"></app-sidebar>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1>📖 另一个伊甸 攻略查询站</h1>
        <p style="margin-top:8px;color:var(--color-text-light);">
          欢迎来到《另一个伊甸：超越时空的猫》中文攻略站！选择下方板块开始查询。
        </p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-icon">⚔️</span>
          <div>
            <div class="stat-value">14</div>
            <div class="stat-label">数据板块</div>
          </div>
        </div>
        <div class="stat-card">
          <span class="stat-icon">📝</span>
          <div>
            <div class="stat-value">70+</div>
            <div class="stat-label">示例数据</div>
          </div>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🔄</span>
          <div>
            <div class="stat-value">持续更新</div>
            <div class="stat-label">数据状态</div>
          </div>
        </div>
      </div>

      <div class="card-grid">
        <a v-for="item in navItems" :key="item.id" :href="item.path" class="card">
          <div class="card-icon">{{ item.icon }}</div>
          <div class="card-name">{{ item.name }}</div>
          <div class="card-count">{{ getItemCount(item.name) }} 条数据</div>
        </a>
      </div>
    </main>
  </div>
  <script type="module">
    import { createApp } from 'vue'
    import AppSidebar from './src/components/AppSidebar.vue'
    import { navItems } from './src/data/nav.js'
    import './src/assets/styles/variables.css'
    import './src/assets/styles/reset.css'
    import './src/assets/styles/layout.css'
    import './src/assets/styles/sidebar.css'
    import './src/assets/styles/table.css'
    import './src/assets/styles/cards.css'

    const countMap = {
      '角色': 5, '战斗': 5, '武器': 5, '防具': 5, '徽章': 5,
      '地图': 5, '灵晶': 5, '书架': 5, '猫': 5, '日记': 5,
      '专武': 5, '回生': 5, '副本': 5, '活动': 5
    }

    const app = createApp({
      data() { return { navItems, sidebarOpen: false } },
      methods: {
        toggleSidebar() { this.sidebarOpen = !this.sidebarOpen },
        getItemCount(name) { return countMap[name] || '待补充' }
      }
    })
    app.component('app-sidebar', AppSidebar)
    app.mount('#app')
  </script>
</body>
</html>
